name: Crawl Speeto

on:
  schedule:
    # 매일 21:30 UTC (매일 06:30 KST)
    - cron: '30 21 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r gooddear/data/crawling/requirements.txt

    - name: Run speeto store scraping (최신 회차만)
      run: |
        cd gooddear/data/crawling
        python crawl_lotto_stores.py latest

    - name: Upload to Firebase
      env:
        FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      run: |
        cd gooddear/data/crawling
        python upload_to_firebase.py

    - name: Commit and push results
      run: |
        git config user.name "Lottery Bot"
        git config user.email "lottery-bot@github.com"
        git add -A
        git commit -m "Auto: Update speeto data - $(date '+%Y-%m-%d %H:%M:%S')" || true
        git push
