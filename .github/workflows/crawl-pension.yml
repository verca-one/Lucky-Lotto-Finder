name: Crawl Pension Lottery

on:
  schedule:
    # 매주 목요일 10:30 UTC (목요일 19:30 KST)
    - cron: '30 10 * * 4'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r gooddear/data/crawling/requirements.txt

    - name: Run pension lottery store scraping (최신 회차만)
      run: |
        cd gooddear/data/crawling
        python crawl_lotto_stores.py latest

    - name: Upload to Supabase
      env:
        SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      run: |
        cd gooddear/data/crawling
        python upload_to_supabase.py latest pension zero_base_pension_stores_latest.json

    - name: Commit and push results
      run: |
        git config user.name "Lottery Bot"
        git config user.email "lottery-bot@github.com"
        git add -A
        git commit -m "Auto: Update pension lottery data - $(date '+%Y-%m-%d %H:%M:%S')" || true
        git push
