name: Crawl Lotto

on:
  schedule:
    # 매주 토요일 12:30 UTC (토요일 21:30 KST)
    - cron: '30 12 * * 6'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser chromium-chromedriver

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r data/crawling/requirements.txt

    - name: Run lotto number scraping
      run: |
        cd data/crawling
        python scrape_lotto_numbers.py

    - name: Run lotto store scraping
      run: |
        cd data/crawling
        python crawl_all_lottery.py

    - name: Upload to Firebase
      env:
        FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      run: |
        cd data/crawling
        python upload_to_firebase.py

    - name: Commit and push results
      run: |
        git config user.name "Lottery Bot"
        git config user.email "lottery-bot@github.com"
        git add -A
        git commit -m "Auto: Update lotto data - $(date '+%Y-%m-%d %H:%M:%S')" || true
        git push
