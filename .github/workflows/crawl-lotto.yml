name: Crawl Lotto

on:
  schedule:
    # 매주 토요일 12:30 UTC (토요일 21:30 KST)
    - cron: '30 12 * * 6'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r gooddear/data/crawling/requirements.txt

    # - name: Run lotto number scraping
    #   run: |
    #     cd gooddear/data/crawling
    #     python scrape_lotto_numbers.py

    - name: Run lotto store scraping (최신 회차만)
      run: |
        cd gooddear/data/crawling
        python crawl_lotto_stores.py latest

    - name: Upload to Supabase
      env:
        SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      run: |
        cd gooddear/data/crawling
        python upload_to_supabase.py latest lotto zero_base_lotto_stores_latest.json

    - name: Commit and push results
      run: |
        git config user.name "Lottery Bot"
        git config user.email "lottery-bot@github.com"
        git add -A
        git commit -m "Auto: Update lotto data - $(date '+%Y-%m-%d %H:%M:%S')" || true
        git push
